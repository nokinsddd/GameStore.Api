version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gamestore-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamestore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gamestore-net

  app:
    build: .
    container_name: gamestore-app
    environment:
      ConnectionStrings__GameStore: "User ID=postgres;Password=postgres;Host=postgres;Port=5432;Database=gamestore"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gamestore-net
    restart: unless-stopped

networks:
  gamestore-net:
    driver: bridge

volumes:
  postgres-data:
